<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blu SRL Teak</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
}

.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;

  background:
  linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)),
  url('hero.JPG') center/cover no-repeat;
}

section {
  padding: 60px 20px;
  text-align: center;
}

.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  width: 300px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>BLU SRL TEAK</h1>
  <p>Importazione teak certificato</p>
</div>

<section>
  <h2>Prodotti</h2>

  <div class="cards">

    <div class="card">
      <img src="dettaglio.JPG">
    </div>

    <div class="card">
      <img src="yacht.PNG">
    </div>

    <div class="card">
      <img src="tronchi.PNG">
    </div>

  </div>
</section>

<section>
  <h2>Filiera</h2>

  <div class="card">
    <img src="Foresta.JPG">
  </div>
</section>

</body>
</html>
