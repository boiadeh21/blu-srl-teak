<!DOCTYPE html>

<head>

<title>Blu SRL Teak</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

header {
    background: url('hero.JPG') center/cover;
    height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

    </p>

    <img src="yacht.PNG">
    <img src="dettaglio.JPG">
